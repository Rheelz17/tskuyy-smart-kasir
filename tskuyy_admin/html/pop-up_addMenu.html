<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Tambah Menu Baru - Warkop TSKUY</title>
<link rel="stylesheet" href="../css/pop-up_addMenu-css.css">
</head>
<body>

<div class="modal">
  <div class="modal-header">
    <div class="header-text">
      <h2>Tambah Menu Baru</h2>
      <p>Isi kolom di bawah untuk menambahkan menu baru</p>
    </div>
    <button class="close-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </button>
  </div>

  <div class="modal-body">
    <div class="upload-area" id="drop-zone">
      <input type="file" id="file-input" accept="image/jpeg, image/png" hidden>
      
      <div id="upload-content">
        <div class="upload-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
            <line x1="12" y1="16" x2="12" y2="8"></line>
            <polyline points="9 11 12 8 15 11"></polyline>
          </svg>
        </div>
        <h3>Unggah Gambar</h3>
        <p>Klik atau seret gambar<br>produk (JPG or PNG).</p>
      </div>

      <div id="preview-container" style="display: none;">
        <img id="image-preview" src="" alt="Preview Menu">
        
        <div class="image-actions">
          <button type="button" class="icon-btn edit" id="btn-edit-foto" title="Ganti Foto">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
          <button type="button" class="icon-btn delete" id="btn-hapus-foto" title="Hapus Foto">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="form-area">
      <div class="form-group">
        <label>Nama Menu</label>
        <input type="text" placeholder="Masukkan Nama Menu Baru...">
      </div>
      <div class="form-group">
        <label>Kode Menu</label>
        <input type="text" placeholder="Masukkan Kode Menu Baru...">
      </div>
      <div class="form-group">
        <label>Kategori</label>
        <select>
          <option value="" disabled selected>Kategori</option>
          <option value="makanan">Makanan</option>
          <option value="minuman">Minuman</option>
          <option value="snack">Snack</option>
        </select>
      </div>
      <div class="form-group">
        <label>Stok</label>
        <input type="number" placeholder="Masukkan Stok Menu Baru...">
      </div>
      <div class="form-group">
        <label>Harga Jual</label>
        <input type="number" placeholder="Masukkan Harga Jual Menu Baru...">
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <div class="status-toggle">
      <span>Status awal</span>
      <label class="switch">
        <input type="checkbox">
        <span class="slider"></span>
      </label>
    </div>
    <div class="action-buttons">
      <button class="btn btn-batal">Batal</button>
      <button class="btn btn-simpan">Simpan</button>
    </div>
  </div>
</div>
<script src="../js/pop-up_addMenu-JS.js"></script>
</body>
</html>
