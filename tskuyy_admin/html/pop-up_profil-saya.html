<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop-up Menu Profil</title>
<style>
  /* --- BASE STYLES --- */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    /* Latar belakang abu-abu gelap biar pop-up putihnya kelihatan */
    background-color: #4b5563; 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* --- POP-UP CONTAINER --- */
  .profile-menu-popup {
    background-color: #ffffff;
    border-radius: 20px;
    padding: 12px 16px; /* Padding luar biar nggak mentok */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    min-width: 240px;
  }

  /* --- MENU ITEM --- */
  .menu-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    text-decoration: none;
    border-radius: 12px;
    transition: background-color 0.2s ease;
    cursor: pointer;
  }

  /* Efek saat kursor diarahkan ke menu */
  .menu-item:hover {
    background-color: #f3f4f6; /* Abu-abu sangat terang */
  }

  /* Teks Profil Saya */
  .menu-item span {
    font-size: 24px; /* Ukuran teks lumayan besar sesuai desain */
    color: #737373; /* Warna abu-abu */
    font-weight: 500;
  }

  /* Ikon Wrapper */
  .icon-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
  }

</style>
</head>
<body>

<div class="profile-menu-popup">
  <a href="#" class="menu-item">
    <div class="icon-wrapper">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="#8c9297" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
    </div>
    <span>Profil Saya</span>
  </a>
</div>

</body>
</html>
