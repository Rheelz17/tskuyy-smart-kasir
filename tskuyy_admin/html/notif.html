<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropdown Notifikasi</title>
<link rel="stylesheet" href="../css/notif-css.css">
</head>
<body>

<div class="notif-panel">
  <div class="notif-header">
    <h2>Notifikasi</h2>
    <button class="mark-read-btn">Tandai sudah dibaca</button>
  </div>

  <div class="notif-list">
    
    <div class="notif-item unread">
      <div class="icon-wrapper icon-green">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <div class="notif-content">
        <h4 class="notif-title">Pembayaran QRIS Berhasil</h4>
        <p class="notif-desc">Pesanan #T0945 (Meja 4) senilai Rp56.100 telah lunas</p>
        <div class="notif-time">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          Baru saja
        </div>
      </div>
    </div>

    <div class="notif-item">
      <div class="icon-wrapper icon-blue">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
      </div>
      <div class="notif-content">
        <h4 class="notif-title">Pesanan Self-Order Baru</h4>
        <p class="notif-desc">Meja 7 memsan 4 item baru. Segera Siapkan</p>
        <div class="notif-time">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          1 mnt yang lalu
        </div>
      </div>
    </div>

    <div class="notif-item">
      <div class="icon-wrapper icon-red">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="9" y1="11" x2="15" y2="17"></line>
          <line x1="15" y1="11" x2="9" y2="17"></line>
        </svg>
      </div>
      <div class="notif-content">
        <h4 class="notif-title">Pesanan Dibatalkan</h4>
        <p class="notif-desc">Pesanan #T0944 berhasil dibatalkan</p>
        <div class="notif-time">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          5 mnt yang lalu
        </div>
      </div>
    </div>

  </div>

  <div class="notif-footer">
    <button class="view-all-btn">Lihat Semua Notifikasi</button>
  </div>
</div>

</body>
</html>
