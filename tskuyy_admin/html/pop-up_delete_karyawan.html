<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Konfirmasi Hapus</title>
<link rel="stylesheet" href="../css/pop-up_delete_karyawan.css">
</head>
<body>
<div class="delete-modal">
  <div class="icon-wrapper">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="6" x2="12" y2="14"></line>
      <line x1="12" y1="18" x2="12.01" y2="18"></line>
    </svg>
  </div>

  <h2>Apa kamu yakin untuk menghapus menu ini?</h2>
  <p>Karyawan "Fahri Eka Pratama" akan dihapus permanen dari daftar karyawan. Tindakan ini tidak bisa dibatalkan.</p>

  <div class="button-group">
    <button class="btn btn-batal">Batal</button>
    <button class="btn btn-hapus">Ya, Hapus Permanen</button>
  </div>
</div>
</body>
</html>
