<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warkop Tskuy — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <section class="page page-register" id="page-register">
      <div class="auth-layout auth-layout-register">
        <div class="auth-illus-col">
          <div class="illus-bg">
            <div class="illus-pattern"></div>
          </div>
        </div>

        <div class="auth-form-col auth-form-col-register">
          <div class="auth-card auth-card-register">
            <div class="brand">
              <div class="brand-logo">
                <img
                  src="../tskuyy_kasir/image/logo_warkop.png"
                  alt="Tskuy Kasir Logo"
                  class="logo-login-img"
                />
              </div>
              <div class="brand-text">
                <span class="brand-sub">Warkop</span>
                <span class="brand-name">Tskuy</span>
              </div>
            </div>

            <p class="auth-greeting">Selamat Bergabung</p>
            <h1 class="auth-title">Buat akun</h1>

            <div class="register-grid">
              <div class="form-group">
                <label class="form-label"
                  >Nama lengkap <span class="required">*</span></label
                >
                <input
                  type="text"
                  class="form-input"
                  placeholder="Masukkan Nama Lengkap"
                />
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Kata Sandi <span class="required">*</span></label
                >
                <div class="input-icon-wrap">
                  <input
                    type="password"
                    class="form-input"
                    placeholder="Buat kata sandi"
                  />
                  <span class="input-icon">
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="#aaa"
                      stroke-width="2"
                      stroke-linecap="round"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </span>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Nama pengguna <span class="required">*</span></label
                >
                <input
                  type="text"
                  class="form-input"
                  placeholder="Masukkan nama pengguna"
                />
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Masukkan Ulang Kata Sandi
                  <span class="required">*</span></label
                >
                <div class="input-icon-wrap">
                  <input
                    type="password"
                    class="form-input"
                    placeholder="Konfirmasi kata sandi"
                  />
                  <span class="input-icon">
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="#aaa"
                      stroke-width="2"
                      stroke-linecap="round"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </span>
                </div>
                <span class="form-hint"
                  >Ulangi kata sandi yang telah anda masukkan</span
                >
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Alamat Email <span class="required">*</span></label
                >
                <input
                  type="email"
                  class="form-input"
                  placeholder="Masukkan email"
                />
                <span class="form-hint">Gunakan email aktif anda</span>
              </div>

              <div class="form-group">
                <label class="form-label"
                  >Peran Akses (Role) <span class="required">*</span></label
                >
                <div class="select-wrap">
                  <select class="form-input form-select">
                    <option value="" disabled selected>Pilih Peran...</option>
                    <option value="kasir">Kasir</option>
                    <option value="admin">Admin</option>
                    <option value="owner">Owner</option>
                  </select>
                  <span class="select-icon">
                    <svg
                      width="14"
                      height="14"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="#aaa"
                      stroke-width="2"
                      stroke-linecap="round"
                    >
                      <polyline points="6 9 12 15 18 9" />
                    </svg>
                  </span>
                </div>
              </div>
            </div>

            <a href="login.html" class="btn-primary">Registrasi</a>

            <p class="auth-footer-text">
              Sudah punya akun admin?
              <a href="login.html" class="auth-link">Masuk</a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
